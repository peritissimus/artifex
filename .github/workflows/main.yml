name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

  release:
    name: Version & Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$last_tag" ]; then
            range="$last_tag..HEAD"
          else
            range="HEAD"
          fi

          # Match subject lines only: full bodies can mention markers in prose
          log=$(git log "$range" --pretty=%s)
          bump=""
          if echo "$log" | grep -qF '[release:major]'; then
            bump=major
          elif echo "$log" | grep -qF '[release:minor]'; then
            bump=minor
          elif echo "$log" | grep -qF '[release]'; then
            bump=patch
          fi

          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "range=$range" >> "$GITHUB_OUTPUT"
          if [ -z "$bump" ]; then
            echo "No [release] marker since ${last_tag:-start}; skipping release."
          fi

      - name: Tag and release
        if: steps.bump.outputs.bump != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          version=$(npm version "${{ steps.bump.outputs.bump }}" --no-git-tag-version)
          notes=$(git log "${{ steps.bump.outputs.range }}" --no-merges --pretty='- %s (%h)')

          {
            echo "## $version ($(date +%Y-%m-%d))"
            echo
            echo "$notes"
            echo
            cat CHANGELOG.md 2>/dev/null || true
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

          git add package.json CHANGELOG.md
          git commit -m "chore(release): ${version#v} [skip ci]"
          git tag -a "$version" -m "$version"
          git push origin main "refs/tags/$version"
          gh release create "$version" --title "$version" --notes "$notes"
